name: R-hub

# Cancel older runs on the same branch to save minutes
concurrency:
  group: rhub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      config:
        description: "Comma-separated R-hub platforms"
        type: string
        default: "ubuntu-next,ubuntu-release"
      name:
        description: "Run name (optional)"
        type: string
      id:
        description: "Unique ID (optional)"
        type: string

run-name: >-
  ${{ github.event.inputs.id }}:
  ${{ github.event.inputs.name || format('Triggered by {0}', github.triggering_actor) }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.rhub-setup.outputs.containers }}
      platforms:  ${{ steps.rhub-setup.outputs.platforms }}
    steps:
      # Determine which runners are needed for our platform list
      - uses: r-hub/actions/setup@v1
        id: rhub-setup
        with:
          # Keep automatic R-hub checks on patched/release Linux only.
          # As of March 27, 2026, the available devel-style flavors in
          # r-hub/actions are surfacing upstream plotly/lazyeval breakage that
          # is unrelated to this package. Release macOS/Windows remain covered
          # by the regular R-CMD-check workflow.
          config: ${{ github.event.inputs.config || 'ubuntu-next,ubuntu-release' }}

  linux-containers:
    needs: setup
    if: ${{ needs.setup.outputs.containers != '[]' }}
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.containers) }}
    container:
      image: ${{ matrix.config.container }}
    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - name: Remove stale pak lockfile
        run: rm -f .github/pkg.lock
        shell: bash
      - uses: r-hub/actions/setup-deps@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - name: Refresh packages built under older R
        run: >
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org"));
          ip <- installed.packages();
          cur <- paste0(R.version$major, ".", sub("\\..*$", "", R.version$minor));
          built <- ip[, "Built"];
          priority <- ip[, "Priority"];
          pkgs <- rownames(ip)[!is.na(built) & !startsWith(built, cur) & is.na(priority)];
          if (length(pkgs)) install.packages(pkgs, Ncpus = max(1L, parallel::detectCores(logical = FALSE)))'
        shell: bash
      - uses: r-hub/actions/run-check@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}
    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/setup-r@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - name: Remove stale pak lockfile
        run: rm -f .github/pkg.lock
        shell: bash
      - uses: r-hub/actions/setup-deps@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - name: Refresh packages built under older R
        run: >
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org"));
          ip <- installed.packages();
          cur <- paste0(R.version$major, ".", sub("\\..*$", "", R.version$minor));
          built <- ip[, "Built"];
          priority <- ip[, "Priority"];
          pkgs <- rownames(ip)[!is.na(built) & !startsWith(built, cur) & is.na(priority)];
          if (length(pkgs)) install.packages(pkgs, Ncpus = max(1L, parallel::detectCores(logical = FALSE)))'
        shell: bash
      - uses: r-hub/actions/run-check@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
