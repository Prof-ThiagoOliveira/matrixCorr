name: mkl-check

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions: read-all

jobs:
  mkl-check:
    # This workflow exists because CRAN observed an R-devel + MKL native-code
    # segfault in repeated-measures CCC/ICC REML paths.
    runs-on: ubuntu-latest
    name: ubuntu-latest (R-${{ matrix.r }}, OMP=${{ matrix.omp_threads }}, MKL=${{ matrix.mkl_threads }})

    strategy:
      fail-fast: false
      matrix:
        include:
          - r: devel
            omp_threads: '1'
            mkl_threads: '1'
          - r: devel
            omp_threads: '2'
            mkl_threads: '2'

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      MKLROOT: /opt/intel/oneapi/mkl/latest
      MKL_INTERFACE_LAYER: GNU,LP64
      MKL_THREADING_LAYER: GNU
      OMP_NUM_THREADS: ${{ matrix.omp_threads }}
      MKL_NUM_THREADS: ${{ matrix.mkl_threads }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Remove stale pak lockfile
        run: rm -f .github/pkg.lock

      - name: Install Intel oneMKL from Intel APT repository
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gpg-agent ca-certificates
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel
          echo "${MKLROOT}/lib" | sudo tee /etc/ld.so.conf.d/oneapi-mkl.conf
          sudo ldconfig

      - name: Point R BLAS/LAPACK to MKL
        run: |
          set -euxo pipefail
          R_HOME="$(R RHOME)"
          MKL_LIB="${MKLROOT}/lib/libmkl_rt.so"
          test -f "${MKL_LIB}"
          if [ -e "${R_HOME}/lib/libRblas.so" ]; then
            for lib in libRblas.so libRlapack.so; do
              if [ -e "${R_HOME}/lib/${lib}" ]; then
                sudo cp -a "${R_HOME}/lib/${lib}" "${R_HOME}/lib/${lib}.pre-mkl"
                sudo rm -f "${R_HOME}/lib/${lib}"
                sudo ln -s "${MKL_LIB}" "${R_HOME}/lib/${lib}"
              fi
            done

            ls -l "${R_HOME}/lib/libRblas.so"
            if [ -e "${R_HOME}/lib/libRlapack.so" ]; then
              ls -l "${R_HOME}/lib/libRlapack.so"
            fi
          else
            BLAS_ALT_NAME="libblas.so.3-x86_64-linux-gnu"
            LAPACK_ALT_NAME="liblapack.so.3-x86_64-linux-gnu"
            BLAS_ALT="$(update-alternatives --list "${BLAS_ALT_NAME}" | grep 'mkl' | head -n 1 || true)"
            LAPACK_ALT="$(update-alternatives --list "${LAPACK_ALT_NAME}" | grep 'mkl' | head -n 1 || true)"

            test -n "${BLAS_ALT}"
            test -n "${LAPACK_ALT}"

            sudo update-alternatives --set "${BLAS_ALT_NAME}" "${BLAS_ALT}"
            sudo update-alternatives --set "${LAPACK_ALT_NAME}" "${LAPACK_ALT}"

            update-alternatives --display "${BLAS_ALT_NAME}"
            update-alternatives --display "${LAPACK_ALT_NAME}"
          fi

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 3
          extra-packages: any::rcmdcheck
          needs: check

      - name: Reinstall rlang to avoid mixed-R binary issues on devel
        run: |
          install.packages("rlang", type = "source", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Refresh packages built under older R
        run: >
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org"));
          ip <- installed.packages();
          cur <- paste0(R.version$major, ".", strsplit(R.version$minor, ".", fixed = TRUE)[[1]][1]);
          built <- ip[, "Built"];
          priority <- ip[, "Priority"];
          pkgs <- rownames(ip)[!is.na(built) & !startsWith(built, cur) & is.na(priority)];
          if (length(pkgs)) install.packages(pkgs, Ncpus = max(1L, parallel::detectCores(logical = FALSE)))'

      - name: Print R and MKL diagnostics
        run: |
          set -euxo pipefail
          Rscript -e 'cat(R.version.string, "\n", sep = "");
          print(sessionInfo());
          cat("R.home(): ", R.home(), "\n", sep = "");
          cat("extSoftVersion()[\"BLAS\"]: ", extSoftVersion()[["BLAS"]], "\n", sep = "");
          cat("extSoftVersion()[\"LAPACK\"]: ", extSoftVersion()[["LAPACK"]], "\n", sep = "");
          print(Sys.getenv(c("MKLROOT", "MKL_INTERFACE_LAYER", "MKL_THREADING_LAYER", "OMP_NUM_THREADS", "MKL_NUM_THREADS")));'
          R_HOME="$(R RHOME)"
          if [ -e "${R_HOME}/lib/libRblas.so" ]; then
            readlink -f "${R_HOME}/lib/libRblas.so" || true
            if [ -e "${R_HOME}/lib/libRlapack.so" ]; then
              readlink -f "${R_HOME}/lib/libRlapack.so" || true
            fi
            if command -v ldd >/dev/null 2>&1; then
              ldd "${R_HOME}/lib/libRblas.so"
              if [ -e "${R_HOME}/lib/libRlapack.so" ]; then
                ldd "${R_HOME}/lib/libRlapack.so"
              fi
            fi
          else
            update-alternatives --display libblas.so.3-x86_64-linux-gnu || true
            update-alternatives --display liblapack.so.3-x86_64-linux-gnu || true
            if command -v ldconfig >/dev/null 2>&1; then
              ldconfig -p | grep -E 'libblas\.so\.3|liblapack\.so\.3|libmkl_rt\.so' || true
            fi
          fi

      - name: Install matrixCorr
        run: R CMD INSTALL .

      - name: Run REML MKL reproducer
        run: Rscript inst/repro/repro-ccc-vc-segfault.R

      - name: Run repeated-measures CCC tests
        run: Rscript -e 'library(matrixCorr); testthat::test_file("tests/testthat/test_ccc_repeated.R")'

      - name: Run repeated-measures ICC tests
        run: Rscript -e 'library(matrixCorr); testthat::test_file("tests/testthat/test_icc.R")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--ignore-vignettes")'
          build_args: 'c("--no-build-vignettes")'
